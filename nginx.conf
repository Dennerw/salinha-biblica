server {
    listen 80;
    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Cache immutable assets (hashed filenames)
    location ~* ^/salinhabiblicadinamicas/assets/ {
        rewrite ^/salinhabiblicadinamicas/(.*)$ /$1 break;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache PWA manifest and icons
    location ~* \.(webmanifest|png|svg|ico)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    # Service worker must not be cached
    location = /salinhabiblicadinamicas/sw.js {
        rewrite ^/salinhabiblicadinamicas/(.*)$ /$1 break;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Redirect without trailing slash
    location = /salinhabiblicadinamicas {
        return 301 $scheme://$host/salinhabiblicadinamicas/;
    }

    # SPA: strip prefix and fall back to index.html for all routes
    location /salinhabiblicadinamicas/ {
        rewrite ^/salinhabiblicadinamicas/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }
}
