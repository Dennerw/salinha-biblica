<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#3B82F6"/>
  <!-- Inner circle lighter -->
  <circle cx="256" cy="256" r="220" fill="#60A5FA" opacity="0.4"/>

  <!-- Open book left page -->
  <path d="M100 180 Q140 160 256 170 L256 360 Q140 350 100 370 Z" fill="white" opacity="0.95"/>
  <!-- Open book right page -->
  <path d="M412 180 Q372 160 256 170 L256 360 Q372 350 412 370 Z" fill="#EFF6FF" opacity="0.95"/>
  <!-- Book spine -->
  <rect x="248" y="165" width="16" height="200" rx="4" fill="#BFDBFE"/>

  <!-- Lines on left page -->
  <line x1="120" y1="220" x2="240" y2="215" stroke="#93C5FD" stroke-width="6" stroke-linecap="round"/>
  <line x1="115" y1="242" x2="240" y2="237" stroke="#93C5FD" stroke-width="6" stroke-linecap="round"/>
  <line x1="115" y1="264" x2="240" y2="259" stroke="#93C5FD" stroke-width="6" stroke-linecap="round"/>
  <line x1="118" y1="286" x2="240" y2="281" stroke="#93C5FD" stroke-width="5" stroke-linecap="round"/>
  <line x1="120" y1="306" x2="240" y2="302" stroke="#93C5FD" stroke-width="5" stroke-linecap="round"/>

  <!-- Cross on right page -->
  <rect x="290" y="200" width="14" height="120" rx="5" fill="#3B82F6"/>
  <rect x="262" y="228" width="70" height="14" rx="5" fill="#3B82F6"/>

  <!-- Star above book -->
  <polygon points="256,80 267,112 301,112 274,131 285,163 256,145 227,163 238,131 211,112 245,112"
    fill="#FACC15" stroke="#F59E0B" stroke-width="2"/>
</svg>
