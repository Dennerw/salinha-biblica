<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Salinha Bíblica</title>
  <script>
    // GitHub Pages SPA redirect: encode the path as a query param so index.html
    // can restore it with history.replaceState (keeping browser history clean).
    // segmentCount = 1 keeps the /salinha-biblica prefix.
    var segmentCount = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
